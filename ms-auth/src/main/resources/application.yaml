server:
  port: 8089

spring:
  application:
    name: ms-auth
  datasource:
    url: jdbc:mysql://localhost:3306/vet_auth?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: "ClaveSecretaNoTanSecretaMishAunFaltanMasLetras"
  expiration: 3600000
